<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Tính doanh số</title>

  <style>
    :root {
      --bg:#0f172a;
      --card:#111827;
      --txt:#e5e7eb;
      --muted:#9ca3af;
      --pri:#22c55e;
      --view:#38bdf8;
      --err:#ef4444;
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:linear-gradient(120deg,#0b1220,#0a0f1a);
      color:var(--txt);
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card {
      width:100%;
      max-width:520px;
      background:var(--card);
      border:1px solid #1f2937;
      border-radius:18px;
      padding:22px 22px 18px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    h1 {
      margin:0 0 4px;
      font-size:20px;
    }

    p {
      margin:0 0 18px;
      color:var(--muted);
      font-size:14px;
    }

    .row {
      display:flex;
      gap:12px;
      align-items:end;
      margin:10px 0 6px;
    }

    label {
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:0 0 6px;
    }

    input[type="month"] {
      appearance:none;
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #263144;
      background:#0b1220;
      color:var(--txt);
      outline:none;
      font-size:15px;
    }

    button {
      white-space:nowrap;
      padding:12px 16px;
      border-radius:12px;
      border:1px solid #1d2a3d;
      background:var(--pri);
      color:#06240f;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:transform .04s ease, filter .15s ease;
    }

    button:hover {
      filter:brightness(1.06);
    }

    button:active {
      transform:translateY(1px);
    }

    button:disabled {
      opacity:.7;
      cursor:not-allowed;
    }

    .btn-view {
      width:100%;
      margin-top:14px;
      background:var(--view);
      color:#041923;
    }

    .hint {
      font-size:12px;
      color:var(--muted);
      margin-top:8px;
    }

    .toast {
      margin-top:14px;
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
      display:none;
      border:1px solid #273244;
      background:#0a1220;
      word-break:break-word;
      white-space:pre-wrap;
    }

    .toast.ok {
      border-color:#1e4d36;
      background:#0b1f17;
      color:#b9f4d2;
    }

    .toast.err {
      border-color:#4a2323;
      background:#1a0e0e;
      color:#fecaca;
    }

    .spinner {
      display:none;
      margin-left:8px;
      width:16px;
      height:16px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
      vertical-align:middle;
    }

    @keyframes spin {
      to {
        transform:rotate(360deg);
      }
    }

    @media (max-width:520px) {
      .row {
        flex-direction:column;
        align-items:stretch;
      }

      .row button {
        width:100%;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🧮 Tính doanh số</h1>

    <p>
      Chọn <b>năm-tháng</b> rồi bấm nút bên phải.
      Hệ thống sẽ gửi webhook kèm tháng <code>yyyy-mm</code>.
    </p>

    <div class="row">
      <div style="flex:1">
        <label for="ym">Năm-tháng yyyy-mm</label>
        <input id="ym" type="month" required />
      </div>

      <div>
        <button id="btn" type="button">
          Tính doanh số <span id="spin" class="spinner"></span>
        </button>
      </div>
    </div>

    <div class="hint">
      Lưu ý: định dạng chính xác ví dụ <code>2025-11</code>.
    </div>

    <button id="btnXemDoanhSo" type="button" class="btn-view">
      📊 Xem doanh số
    </button>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script>
    // =========================
    // CẤU HÌNH
    // =========================
    const WEBHOOK_TINH_DOANH_SO = 'https://n8n.clawbot.io.vn/webhook/tinh_doanh_so';
    const FORM_XEM_DOANH_SO = 'doanh_so_nhan_vien.html';

    // =========================
    // ELEMENTS
    // =========================
    const btn = document.getElementById('btn');
    const ymInp = document.getElementById('ym');
    const toast = document.getElementById('toast');
    const spin = document.getElementById('spin');
    const btnXemDoanhSo = document.getElementById('btnXemDoanhSo');

    // =========================
    // MẶC ĐỊNH THÁNG HIỆN TẠI
    // =========================
    (function setDefaultMonth() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      ymInp.value = `${y}-${m}`;
    })();

    // =========================
    // UI HELPER
    // =========================
    function showToast(msg, ok = false) {
      toast.textContent = msg;
      toast.className = 'toast ' + (ok ? 'ok' : 'err');
      toast.style.display = 'block';
    }

    function hideToast() {
      toast.style.display = 'none';
      toast.textContent = '';
    }

    function setLoading(isLoading) {
      btn.disabled = isLoading;
      spin.style.display = isLoading ? 'inline-block' : 'none';
    }

    // =========================
    // VALIDATE
    // =========================
    function validateMonth(v) {
      return /^\d{4}-(0[1-9]|1[0-2])$/.test(v);
    }

    // =========================
    // MỞ FORM KÈM TOKEN
    // =========================
    function getTokenFromAnywhere() {
      const currentParams = new URLSearchParams(window.location.search);

      return (
        currentParams.get('token') ||
        currentParams.get('access_token') ||
        currentParams.get('t') ||
        localStorage.getItem('token') ||
        localStorage.getItem('access_token') ||
        localStorage.getItem('cod_token') ||
        sessionStorage.getItem('token') ||
        sessionStorage.getItem('access_token') ||
        sessionStorage.getItem('cod_token') ||
        ''
      );
    }

    function openPageWithToken(path) {
      const currentParams = new URLSearchParams(window.location.search);
      const url = new URL(path, window.location.href);

      // Mang toàn bộ query hiện tại sang trang mới
      currentParams.forEach((value, key) => {
        url.searchParams.set(key, value);
      });

      // Nếu chưa có token trên URL thì lấy từ local/session storage
      const token = getTokenFromAnywhere();
      if (token && !url.searchParams.get('token')) {
        url.searchParams.set('token', token);
      }

      window.location.href = url.href;
    }

    // =========================
    // GỌI WEBHOOK N8N
    // Dùng form POST để tránh CORS preflight
    // =========================
    async function callWebhook(month) {
      const formData = new URLSearchParams();
      formData.append('month', month);

      const resp = await fetch(WEBHOOK_TINH_DOANH_SO, {
        method: 'POST',
        body: formData
      });

      let detail = '';
      try {
        detail = await resp.text();
      } catch (e) {}

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status} — ${detail || 'Gọi webhook thất bại'}`);
      }

      return detail;
    }

    // =========================
    // EVENTS
    // =========================
    btn.addEventListener('click', async () => {
      hideToast();

      const month = (ymInp.value || '').trim();

      if (!validateMonth(month)) {
        showToast('Lỗi tháng! Vui lòng chọn đúng định dạng YYYY-MM.', false);
        ymInp.focus();
        return;
      }

      setLoading(true);

      try {
        const resultText = await callWebhook(month);

        showToast(
          `Đã gửi tính doanh số cho tháng ${month}.` +
          (resultText ? `\nPhản hồi: ${resultText}` : ''),
          true
        );
      } catch (err) {
        showToast(`Gọi webhook lỗi: ${err.message}`, false);
      } finally {
        setLoading(false);
      }
    });

    btnXemDoanhSo.addEventListener('click', () => {
      openPageWithToken(FORM_XEM_DOANH_SO);
    });

    ymInp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        btn.click();
      }
    });
  </script>
</body>
</html>

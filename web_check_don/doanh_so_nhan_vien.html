<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sheet hóa đơn</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .wrap { padding: 16px; }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .toolbar {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .input {
      min-width: 190px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }

    select[multiple] {
      height: 92px;
      min-width: 250px;
    }

    .status {
      font-size: 13px;
      color: #6b7280;
      padding-top: 25px;
    }

    .sheet-box {
      width: 100%;
      overflow: auto;
      background: white;
      border: 1px solid #d1d5db;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1500px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e5e7eb;
      font-weight: 700;
      text-align: center;
    }

    td { background: #fff; }

    tr.hidden { display: none; }

    .num { text-align: right; }
    .center { text-align: center; }
  </style>
</head>
<body>

<div class="wrap">
  <h2>Sheet hóa đơn</h2>

  <div class="toolbar">
    <div class="field">
      <label>Nhân viên</label>
      <select id="filterMaNv" class="input" multiple>
        <option value="">Tất cả nhân viên</option>
      </select>
    </div>

    <div class="field">
      <label>Thương hiệu</label>
      <select id="filterThuongHieu" class="input">
        <option value="">Tất cả</option>
        <option value="hang_thuong">Hàng thường</option>
        <option value="doc_quyen">Độc quyền</option>
      </select>
    </div>

    <div id="status" class="status">Đang tải dữ liệu...</div>
  </div>

  <div class="sheet-box">
    <table id="sheetTable">
      <thead>
<tr>
  <th>ma_hd</th>
  <th>ma_nv</th>
  <th>nv_ban</th>
  <th>ngay</th>
  <th>ten_kh</th>
  <th>ten_hh</th>
  <th>thuong_hieu</th>
  <th>sl</th>
  <th>sl_tra</th>
  <th>sl_thuc</th>
  <th>don_gia</th>
  <th>thanh_tien</th>
  <th>ngay_thu</th>
  <th>tien_thu</th>
  <th>ghichu</th>
</tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const TABLE_NAME = 'hoa_don_ban_chitiet';

  const columns = [
    'ma_hd',
    'ma_nv',
    'nv_ban',
    'ngay',
    'ma_kh',
    'ten_kh',
    'ten_hh',
    'thuong_hieu',
    'sl',
    'sl_tra',
    'sl_thuc',
    'don_gia',
    'thanh_tien',
    'ngay_thu',
    'tien_thu',
    'ghichu',
  ];

  let allRows = [];

  function text(value) {
    return value === null || value === undefined ? '' : String(value);
  }

  function money(value) {
    const n = Number(value || 0);
    if (!Number.isFinite(n)) return '';
    return Math.round(n).toLocaleString('vi-VN');
  }

  function formatValue(key, value) {
    if (['sl', 'sl_tra', 'sl_thuc', 'don_gia', 'thanh_tien', 'tien_thu'].includes(key)) {
      return money(value);
    }
    return text(value);
  }

  function getSelectedMaNv() {
    const select = document.getElementById('filterMaNv');
    return Array.from(select.selectedOptions)
      .map(opt => opt.value)
      .filter(Boolean);
  }

  function renderNhanVienFilter(rows) {
    const select = document.getElementById('filterMaNv');
    const mapNv = new Map();

    for (const row of rows) {
      const maNv = text(row.ma_nv).trim();
      const tenNv = text(row.nv_ban).trim();
      if (!maNv) continue;
      if (!mapNv.has(maNv)) mapNv.set(maNv, tenNv);
    }

    select.innerHTML = '<option value="">Tất cả nhân viên</option>';

    for (const [maNv, tenNv] of mapNv.entries()) {
      const opt = document.createElement('option');
      opt.value = maNv;
      opt.textContent = tenNv ? `${maNv} - ${tenNv}` : maNv;
      select.appendChild(opt);
    }
  }

  function renderTable(rows) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    for (const row of rows) {
      const tr = document.createElement('tr');

      for (const key of columns) {
        const td = document.createElement('td');
        td.textContent = formatValue(key, row[key]);

        if (['sl', 'sl_tra', 'sl_thuc', 'don_gia', 'thanh_tien', 'tien_thu'].includes(key)) {
          td.className = 'num';
        }

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
  }

  function applyFilter() {
    const selectedMaNv = getSelectedMaNv();
    const thuongHieuFilter = document.getElementById('filterThuongHieu').value;

    const filtered = allRows.filter(row => {
      const maNv = text(row.ma_nv).trim();
      const thuongHieu = text(row.thuong_hieu).toUpperCase();

      const matchNv =
        selectedMaNv.length === 0 ||
        selectedMaNv.includes(maNv);

      const coDQ = thuongHieu.includes('DQ');

      let matchThuongHieu = true;

      if (thuongHieuFilter === 'doc_quyen') {
        matchThuongHieu = coDQ;
      }

      if (thuongHieuFilter === 'hang_thuong') {
        matchThuongHieu = !coDQ;
      }

      return matchNv && matchThuongHieu;
    });

    renderTable(filtered);
    document.getElementById('status').textContent =
      `Hiển thị ${filtered.length}/${allRows.length} dòng`;
  }

  async function loadData() {
    const status = document.getElementById('status');

    try {
      status.textContent = 'Đang tải dữ liệu...';

      const cfgRes = await fetch('/api/getConfig');
      const cfg = await cfgRes.json();

      const selectCols = columns.join(',');

      const res = await fetch(
        `${cfg.url}/rest/v1/${TABLE_NAME}?select=${selectCols}&order=ngay_thu.desc&limit=5000`,
        {
          headers: {
            apikey: cfg.anon,
            Authorization: `Bearer ${cfg.anon}`,
          },
        }
      );

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText);
      }

      allRows = await res.json();

      renderNhanVienFilter(allRows);
      applyFilter();
    } catch (err) {
      console.error(err);
      status.textContent = 'Lỗi tải dữ liệu';
      alert('Không tải được dữ liệu từ hoa_don_ban_chitiet');
    }
  }

  document.getElementById('filterMaNv').addEventListener('change', applyFilter);
  document.getElementById('filterThuongHieu').addEventListener('change', applyFilter);

  loadData();
</script>

</body>
</html>

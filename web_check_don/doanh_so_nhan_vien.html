<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sheet hóa đơn</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .wrap { padding: 16px; }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .toolbar {
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .input {
      height: 38px;
      min-width: 170px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }

    .btn {
      height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      background: #16a34a;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover { background: #15803d; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .multi {
      position: relative;
      min-width: 300px;
    }

    .multi-btn {
      width: 100%;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      padding: 0 10px;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
    }

    .multi-panel {
      display: none;
      position: absolute;
      top: 42px;
      left: 0;
      z-index: 20;
      width: 100%;
      max-height: 260px;
      overflow: auto;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      padding: 6px;
    }

    .multi.open .multi-panel { display: block; }

    .multi-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .multi-item:hover { background: #f3f4f6; }

    .status {
      font-size: 13px;
      color: #6b7280;
      padding-top: 24px;
    }

    .summary {
      margin: 10px 0;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .sheet-box {
      width: 100%;
      overflow: auto;
      background: white;
      border: 1px solid #d1d5db;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1450px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e5e7eb;
      font-weight: 700;
      text-align: center;
    }

    td { background: #fff; }
    .num { text-align: right; }

    .pager {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 14px;
      color: #111827;
    }

    .page-size {
      height: 36px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      font-size: 14px;
    }

    .page-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #374151;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    .page-btn:disabled {
      color: #cbd5e1;
      cursor: not-allowed;
    }

    .page-input {
      width: 64px;
      height: 34px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      background: #fff;
    }

    .page-info {
      color: #374151;
      font-weight: 600;
      margin-left: 8px;
    }
  </style>
</head>
<body>

<div class="wrap">
  <h2>Sheet hóa đơn</h2>

  <div class="toolbar">
    <div class="field">
      <label>Nhân viên</label>
      <div id="maNvMulti" class="multi">
        <button type="button" id="maNvBtn" class="multi-btn">Tất cả nhân viên</button>
        <div id="maNvPanel" class="multi-panel"></div>
      </div>
    </div>

    <div class="field">
      <label>Thương hiệu</label>
      <select id="filterThuongHieu" class="input">
        <option value="">Tất cả</option>
        <option value="hang_thuong">Hàng thường</option>
        <option value="doc_quyen">Độc quyền</option>
      </select>
    </div>

    <div class="field">
      <label>Từ ngày thu</label>
      <input id="fromNgayThu" class="input" type="text" placeholder="dd/mm/yyyy">
    </div>

    <div class="field">
      <label>Đến ngày thu</label>
      <input id="toNgayThu" class="input" type="text" placeholder="dd/mm/yyyy">
    </div>

    <div class="field">
      <label>&nbsp;</label>
      <button type="button" id="btnLoadAll" class="btn">Load all</button>
    </div>

    <div id="status" class="status">Đang tải dữ liệu...</div>
  </div>

  <div id="summary" class="summary">Tổng tiền thu: 0</div>

  <div class="sheet-box">
    <table>
      <thead>
        <tr>
          <th>ma_hd</th>
          <th>ma_nv</th>
          <th>nv_ban</th>
          <th>ngay</th>
          <th>ten_kh</th>
          <th>ten_hh</th>
          <th>thuong_hieu</th>
          <th>sl</th>
          <th>sl_tra</th>
          <th>sl_thuc</th>
          <th>don_gia</th>
          <th>thanh_tien</th>
          <th>ngay_thu</th>
          <th>tien_thu</th>
          <th>ghichu</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pager">
    <span>Hiển thị</span>

    <select id="pageSizeSelect" class="page-size">
      <option value="50">50 dòng</option>
      <option value="100" selected>100 dòng</option>
      <option value="200">200 dòng</option>
      <option value="500">500 dòng</option>
    </select>

    <button type="button" id="btnFirstPage" class="page-btn">⇤</button>
    <button type="button" id="btnPrevPage" class="page-btn">‹</button>

    <input id="pageInput" class="page-input" type="number" min="1" value="1">

    <button type="button" id="btnNextPage" class="page-btn">›</button>
    <button type="button" id="btnLastPage" class="page-btn">⇥</button>

    <span id="pageInfo" class="page-info">0 - 0 trong 0 giao dịch</span>
  </div>
</div>

<script>
  const TABLE_NAME = 'hoa_don_ban_chitiet';

  let PAGE_SIZE = 100;
  let allRows = [];
  let currentPage = 1;
  let totalCount = 0;
  let cfg = null;
  let loading = false;
  let loadedAll = false;

  const selectedMaNv = new Set();

  const columns = [
    'ma_hd',
    'ma_nv',
    'nv_ban',
    'ngay',
    'ten_kh',
    'ten_hh',
    'thuong_hieu',
    'sl',
    'sl_tra',
    'sl_thuc',
    'don_gia',
    'thanh_tien',
    'ngay_thu',
    'tien_thu',
    'ghichu',
  ];

  function text(value) {
    return value === null || value === undefined ? '' : String(value);
  }

  function money(value) {
    const n = Number(value || 0);
    if (!Number.isFinite(n)) return '';
    return Math.round(n).toLocaleString('vi-VN');
  }

  function formatValue(key, value) {
    if (['sl', 'sl_tra', 'sl_thuc', 'don_gia', 'thanh_tien', 'tien_thu'].includes(key)) {
      return money(value);
    }
    return text(value);
  }

  function dateInputToNumber(value) {
    const s = String(value || '').trim();
    if (!s) return null;

    const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!m) return null;

    const dd = m[1].padStart(2, '0');
    const mm = m[2].padStart(2, '0');
    const yyyy = m[3];

    return Number(`${yyyy}${mm}${dd}`);
  }

  function ngayThuToNumber(value) {
    const n = Number(String(value || '').trim());
    return Number.isFinite(n) ? n : null;
  }

  function updateMaNvButton() {
    const btn = document.getElementById('maNvBtn');
    btn.textContent = selectedMaNv.size === 0
      ? 'Tất cả nhân viên'
      : `Đã chọn ${selectedMaNv.size} nhân viên`;
  }

  function renderNhanVienFilter(rows) {
    const panel = document.getElementById('maNvPanel');
    const oldSelected = new Set(selectedMaNv);
    const mapNv = new Map();

    for (const row of rows) {
      const maNv = text(row.ma_nv).trim();
      const tenNv = text(row.nv_ban).trim();

      if (!maNv) continue;
      if (!mapNv.has(maNv)) mapNv.set(maNv, tenNv);
    }

    panel.innerHTML = '';

    const allItem = document.createElement('label');
    allItem.className = 'multi-item';
    allItem.innerHTML = `<input type="checkbox" id="checkAllNv"> <span>Tất cả nhân viên</span>`;
    panel.appendChild(allItem);

    for (const [maNv, tenNv] of mapNv.entries()) {
      const label = document.createElement('label');
      label.className = 'multi-item';

      const checked = oldSelected.has(maNv) ? 'checked' : '';
      const textShow = tenNv ? `${maNv} - ${tenNv}` : maNv;

      label.innerHTML = `
        <input type="checkbox" class="ma-nv-check" value="${maNv}" ${checked}>
        <span>${textShow}</span>
      `;

      panel.appendChild(label);
    }

    document.getElementById('checkAllNv').addEventListener('change', function () {
      selectedMaNv.clear();

      document.querySelectorAll('.ma-nv-check').forEach(cb => {
        cb.checked = false;
      });

      this.checked = false;
      updateMaNvButton();
      applyFilter();
    });

    document.querySelectorAll('.ma-nv-check').forEach(cb => {
      cb.addEventListener('change', function () {
        if (this.checked) {
          selectedMaNv.add(this.value);
          document.getElementById('checkAllNv').checked = false;
        } else {
          selectedMaNv.delete(this.value);
        }

        updateMaNvButton();
        applyFilter();
      });
    });

    updateMaNvButton();
  }

  function renderTable(rows) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    for (const row of rows) {
      const tr = document.createElement('tr');

      for (const key of columns) {
        const td = document.createElement('td');
        td.textContent = formatValue(key, row[key]);

        if (['sl', 'sl_tra', 'sl_thuc', 'don_gia', 'thanh_tien', 'tien_thu'].includes(key)) {
          td.className = 'num';
        }

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
  }

  function getFilteredRows() {
    const thuongHieuFilter = document.getElementById('filterThuongHieu').value;
    const fromNgayThu = dateInputToNumber(document.getElementById('fromNgayThu').value);
    const toNgayThu = dateInputToNumber(document.getElementById('toNgayThu').value);

    return allRows.filter(row => {
      const maNv = text(row.ma_nv).trim();
      const thuongHieu = text(row.thuong_hieu).toUpperCase();
      const ngayThu = ngayThuToNumber(row.ngay_thu);

      const matchNv =
        selectedMaNv.size === 0 ||
        selectedMaNv.has(maNv);

      const coDQ = thuongHieu.includes('DQ');

      let matchThuongHieu = true;

      if (thuongHieuFilter === 'doc_quyen') {
        matchThuongHieu = coDQ;
      }

      if (thuongHieuFilter === 'hang_thuong') {
        matchThuongHieu = !coDQ;
      }

      const matchNgayThu =
        (!fromNgayThu || (ngayThu && ngayThu >= fromNgayThu)) &&
        (!toNgayThu || (ngayThu && ngayThu <= toNgayThu));

      return matchNv && matchThuongHieu && matchNgayThu;
    });
  }

  function updateSummary(rows) {
    const tongTienThu = rows.reduce((sum, row) => {
      return sum + Number(row.tien_thu || 0);
    }, 0);

    document.getElementById('summary').textContent =
      `Tổng tiền thu: ${money(tongTienThu)}`;
  }

  function renderPager() {
    const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    const from = totalCount === 0 ? 0 : (currentPage - 1) * PAGE_SIZE + 1;
    const to = Math.min(currentPage * PAGE_SIZE, totalCount);

    document.getElementById('pageInput').value = currentPage;
    document.getElementById('pageInput').max = totalPages;

    document.getElementById('pageInfo').textContent =
      `${from} - ${to} trong ${totalCount} giao dịch`;

    document.getElementById('btnFirstPage').disabled = currentPage <= 1;
    document.getElementById('btnPrevPage').disabled = currentPage <= 1;
    document.getElementById('btnNextPage').disabled = currentPage >= totalPages;
    document.getElementById('btnLastPage').disabled = currentPage >= totalPages;
  }

  function applyFilter() {
    const filtered = getFilteredRows();

    renderTable(filtered);
    updateSummary(filtered);
    renderPager();

    document.getElementById('status').textContent =
      loadedAll
        ? `Hiển thị ${filtered.length}/${allRows.length} dòng`
        : `Trang ${currentPage} - Hiển thị ${filtered.length}/${allRows.length} dòng`;
  }

  async function getConfig() {
    if (cfg) return cfg;

    const cfgRes = await fetch('/api/getConfig');
    cfg = await cfgRes.json();

    return cfg;
  }

  async function loadPage(page) {
    if (loading) return;

    try {
      loading = true;
      loadedAll = false;
      currentPage = page;

      document.getElementById('status').textContent = `Đang tải trang ${page}...`;

      const config = await getConfig();
      const selectCols = columns.join(',');
      const from = (page - 1) * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;

      const res = await fetch(
        `${config.url}/rest/v1/${TABLE_NAME}?select=${selectCols}&order=ngay_thu.desc`,
        {
          headers: {
            apikey: config.anon,
            Authorization: `Bearer ${config.anon}`,
            Range: `${from}-${to}`,
            Prefer: 'count=exact',
          },
        }
      );

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText);
      }

      const contentRange = res.headers.get('content-range') || '';
      const m = contentRange.match(/\/(\d+)$/);
      if (m) totalCount = Number(m[1]);

      allRows = await res.json();

      renderNhanVienFilter(allRows);
      applyFilter();
    } catch (err) {
      console.error(err);
      document.getElementById('status').textContent = 'Lỗi tải dữ liệu';
      alert('Không tải được dữ liệu: ' + err.message);
    } finally {
      loading = false;
    }
  }

  async function loadAll() {
    if (loading) return;

    const btnLoadAll = document.getElementById('btnLoadAll');

    try {
      loading = true;
      btnLoadAll.disabled = true;
      loadedAll = true;
      allRows = [];

      const config = await getConfig();
      const selectCols = columns.join(',');
      let page = 1;

      while (true) {
        document.getElementById('status').textContent =
          `Đang load all... đã tải ${allRows.length} dòng`;

        const from = (page - 1) * PAGE_SIZE;
        const to = from + PAGE_SIZE - 1;

        const res = await fetch(
          `${config.url}/rest/v1/${TABLE_NAME}?select=${selectCols}&order=ngay_thu.desc`,
          {
            headers: {
              apikey: config.anon,
              Authorization: `Bearer ${config.anon}`,
              Range: `${from}-${to}`,
            },
          }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(errText);
        }

        const rows = await res.json();
        allRows = allRows.concat(rows);

        if (rows.length < PAGE_SIZE) break;
        page++;
      }

      totalCount = allRows.length;
      currentPage = 1;

      renderNhanVienFilter(allRows);
      applyFilter();
    } catch (err) {
      console.error(err);
      document.getElementById('status').textContent = 'Lỗi tải dữ liệu';
      alert('Không load all được: ' + err.message);
    } finally {
      loading = false;
      btnLoadAll.disabled = false;
    }
  }

  document.getElementById('maNvBtn').addEventListener('click', function () {
    document.getElementById('maNvMulti').classList.toggle('open');
  });

  document.addEventListener('click', function (e) {
    const box = document.getElementById('maNvMulti');
    if (!box.contains(e.target)) {
      box.classList.remove('open');
    }
  });

  document.getElementById('filterThuongHieu').addEventListener('change', applyFilter);
  document.getElementById('fromNgayThu').addEventListener('input', applyFilter);
  document.getElementById('toNgayThu').addEventListener('input', applyFilter);

  document.getElementById('pageSizeSelect').addEventListener('change', function () {
    PAGE_SIZE = Number(this.value || 100);
    loadPage(1);
  });

  document.getElementById('btnFirstPage').addEventListener('click', function () {
    loadPage(1);
  });

  document.getElementById('btnPrevPage').addEventListener('click', function () {
    if (currentPage > 1) loadPage(currentPage - 1);
  });

  document.getElementById('btnNextPage').addEventListener('click', function () {
    const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    if (currentPage < totalPages) loadPage(currentPage + 1);
  });

  document.getElementById('btnLastPage').addEventListener('click', function () {
    const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    loadPage(totalPages);
  });

  document.getElementById('pageInput').addEventListener('change', function () {
    const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    let page = Number(this.value || 1);

    if (page < 1) page = 1;
    if (page > totalPages) page = totalPages;

    loadPage(page);
  });

  document.getElementById('btnLoadAll').addEventListener('click', loadAll);

  loadPage(1);
</script>

</body>
</html>

<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sheet hóa đơn</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .wrap { padding: 16px; }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .toolbar {
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .input {
      height: 38px;
      min-width: 220px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }

    .multi {
      position: relative;
      min-width: 300px;
    }

    .multi-btn {
      width: 100%;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      padding: 0 10px;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
    }

    .multi-panel {
      display: none;
      position: absolute;
      top: 42px;
      left: 0;
      z-index: 20;
      width: 100%;
      max-height: 260px;
      overflow: auto;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      padding: 6px;
    }

    .multi.open .multi-panel {
      display: block;
    }

    .multi-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .multi-item:hover {
      background: #f3f4f6;
    }

    .status {
      font-size: 13px;
      color: #6b7280;
      padding-top: 24px;
    }

    .sheet-box {
      width: 100%;
      overflow: auto;
      background: white;
      border: 1px solid #d1d5db;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1450px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e5e7eb;
      font-weight: 700;
      text-align: center;
    }

    td { background: #fff; }
    .num { text-align: right; }
  </style>
</head>
<body>

<div class="wrap">
  <h2>Sheet hóa đơn</h2>

  <div class="toolbar">
    <div class="field">
      <label>Nhân viên</label>
      <div id="maNvMulti" class="multi">
        <button type="button" id="maNvBtn" class="multi-btn">Tất cả nhân viên</button>
        <div id="maNvPanel" class="multi-panel"></div>
      </div>
    </div>

    <div class="field">
      <label>Thương hiệu</label>
      <select id="filterThuongHieu" class="input">
        <option value="">Tất cả</option>
        <option value="hang_thuong">Hàng thường</option>
        <option value="doc_quyen">Độc quyền</option>
      </select>
    </div>

    <div id="status" class="status">Đang tải dữ liệu...</div>
  </div>

  <div class="sheet-box">
    <table>
      <thead>
        <tr>
          <th>ma_hd</th>
          <th>ma_nv</th>
          <th>nv_ban</th>
          <th>ngay</th>
          <th>ten_kh</th>
          <th>ten_hh</th>
          <th>thuong_hieu</th>
          <th>sl</th>
          <th>sl_tra</th>
          <th>sl_thuc</th>
          <th>don_gia</th>
          <th>thanh_tien</th>
          <th>ngay_thu</th>
          <th>tien_thu</th>
          <th>ghichu</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const TABLE_NAME = 'hoa_don_ban_chitiet';

  const columns = [
    'ma_hd',
    'ma_nv',
    'nv_ban',
    'ngay',
    'ten_kh',
    'ten_hh',
    'thuong_hieu',
    'sl',
    'sl_tra',
    'sl_thuc',
    'don_gia',
    'thanh_tien',
    'ngay_thu',
    'tien_thu',
    'ghichu',
  ];

  let allRows = [];
  const selectedMaNv = new Set();

  function text(value) {
    return value === null || value === undefined ? '' : String(value);
  }

  function money(value) {
    const n = Number(value || 0);
    if (!Number.isFinite(n)) return '';
    return Math.round(n).toLocaleString('vi-VN');
  }

  function formatValue(key, value) {
    if (['sl', 'sl_tra', 'sl_thuc', 'don_gia', 'thanh_tien', 'tien_thu'].includes(key)) {
      return money(value);
    }
    return text(value);
  }

  function updateMaNvButton() {
    const btn = document.getElementById('maNvBtn');
    const count = selectedMaNv.size;

    if (count === 0) {
      btn.textContent = 'Tất cả nhân viên';
    } else {
      btn.textContent = `Đã chọn ${count} nhân viên`;
    }
  }

  function renderNhanVienFilter(rows) {
    const panel = document.getElementById('maNvPanel');
    const mapNv = new Map();

    for (const row of rows) {
      const maNv = text(row.ma_nv).trim();
      const tenNv = text(row.nv_ban).trim();

      if (!maNv) continue;
      if (!mapNv.has(maNv)) mapNv.set(maNv, tenNv);
    }

    panel.innerHTML = '';

    const allItem = document.createElement('label');
    allItem.className = 'multi-item';
    allItem.innerHTML = `<input type="checkbox" id="checkAllNv"> <span>Tất cả nhân viên</span>`;
    panel.appendChild(allItem);

    for (const [maNv, tenNv] of mapNv.entries()) {
      const label = document.createElement('label');
      label.className = 'multi-item';

      const textShow = tenNv ? `${maNv} - ${tenNv}` : maNv;

      label.innerHTML = `
        <input type="checkbox" class="ma-nv-check" value="${maNv}">
        <span>${textShow}</span>
      `;

      panel.appendChild(label);
    }

    document.getElementById('checkAllNv').addEventListener('change', function () {
      selectedMaNv.clear();

      document.querySelectorAll('.ma-nv-check').forEach(cb => {
        cb.checked = false;
      });

      updateMaNvButton();
      applyFilter();
    });

    document.querySelectorAll('.ma-nv-check').forEach(cb => {
      cb.addEventListener('change', function () {
        if (this.checked) {
          selectedMaNv.add(this.value);
          document.getElementById('checkAllNv').checked = false;
        } else {
          selectedMaNv.delete(this.value);
        }

        updateMaNvButton();
        applyFilter();
      });
    });
  }

  function renderTable(rows) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    for (const row of rows) {
      const tr = document.createElement('tr');

      for (const key of columns) {
        const td = document.createElement('td');
        td.textContent = formatValue(key, row[key]);

        if (['sl', 'sl_tra', 'sl_thuc', 'don_gia', 'thanh_tien', 'tien_thu'].includes(key)) {
          td.className = 'num';
        }

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
  }

  function applyFilter() {
    const thuongHieuFilter = document.getElementById('filterThuongHieu').value;

    const filtered = allRows.filter(row => {
      const maNv = text(row.ma_nv).trim();
      const thuongHieu = text(row.thuong_hieu).toUpperCase();

      const matchNv =
        selectedMaNv.size === 0 ||
        selectedMaNv.has(maNv);

      const coDQ = thuongHieu.includes('DQ');

      let matchThuongHieu = true;

      if (thuongHieuFilter === 'doc_quyen') {
        matchThuongHieu = coDQ;
      }

      if (thuongHieuFilter === 'hang_thuong') {
        matchThuongHieu = !coDQ;
      }

      return matchNv && matchThuongHieu;
    });

    renderTable(filtered);

    document.getElementById('status').textContent =
      `Hiển thị ${filtered.length}/${allRows.length} dòng`;
  }

  async function loadData() {
    const status = document.getElementById('status');

    try {
      status.textContent = 'Đang tải dữ liệu...';

      const cfgRes = await fetch('/api/getConfig');
      const cfg = await cfgRes.json();

      const selectCols = columns.join(',');

      const res = await fetch(
        `${cfg.url}/rest/v1/${TABLE_NAME}?select=${selectCols}&order=ngay_thu.desc&limit=5000`,
        {
          headers: {
            apikey: cfg.anon,
            Authorization: `Bearer ${cfg.anon}`,
          },
        }
      );

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText);
      }

      allRows = await res.json();

      renderNhanVienFilter(allRows);
      applyFilter();
    } catch (err) {
      console.error(err);
      status.textContent = 'Lỗi tải dữ liệu';
      alert('Không tải được dữ liệu: ' + err.message);
    }
  }

  document.getElementById('maNvBtn').addEventListener('click', function () {
    document.getElementById('maNvMulti').classList.toggle('open');
  });

  document.addEventListener('click', function (e) {
    const box = document.getElementById('maNvMulti');
    if (!box.contains(e.target)) {
      box.classList.remove('open');
    }
  });

  document.getElementById('filterThuongHieu').addEventListener('change', applyFilter);

  loadData();
</script>

</body>
</html>

<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sheet hóa đơn</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .wrap {
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .toolbar {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .input {
      height: 38px;
      min-width: 190px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }

    .sheet-box {
      width: 100%;
      overflow: auto;
      background: white;
      border: 1px solid #d1d5db;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e5e7eb;
      font-weight: 700;
      text-align: center;
    }

    td {
      background: #fff;
    }

    td[contenteditable="true"]:focus {
      outline: 2px solid #2563eb;
      background: #eff6ff;
    }

    .num {
      text-align: right;
    }

    .center {
      text-align: center;
    }
  </style>
</head>
<body>

<div class="wrap">
  <h2>Sheet hóa đơn</h2>

  <div class="toolbar">
    <select id="filterNhanVien" class="input">
      <option value="">Tất cả nhân viên</option>
    </select>

    <select id="filterThuongHieu" class="input">
      <option value="">Tất cả thương hiệu</option>
      <option value="hang_thuong">Hàng thường</option>
      <option value="doc_quyen">Độc quyền</option>
    </select>
  </div>

  <div class="sheet-box">
    <table id="sheetTable">
      <thead>
        <tr>
          <th>ma_hd</th>
          <th>nv_ban</th>
          <th>ngay</th>
          <th>ma_kh</th>
          <th>ten_kh</th>
          <th>ten_hh</th>
          <th>thuong_hieu</th>
          <th>sl</th>
          <th>sl_tra</th>
          <th>sl_thuc</th>
          <th>don_gia</th>
          <th>thanh_tien</th>
          <th>ngay_thu</th>
          <th>tien_thu</th>
          <th>ghichu</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  async function loadNhanVien() {
    const select = document.getElementById('filterNhanVien');

    try {
      const cfgRes = await fetch('/api/getConfig');
      const cfg = await cfgRes.json();

      const res = await fetch(
        `${cfg.url}/rest/v1/kv_nhan_vien?select=ma_nv,ten_nv&order=ma_nv.asc`,
        {
          headers: {
            apikey: cfg.anon,
            Authorization: `Bearer ${cfg.anon}`,
          },
        }
      );

      const data = await res.json();

      select.innerHTML = '<option value="">Tất cả nhân viên</option>';

      for (const nv of data) {
        const maNv = String(nv.ma_nv || '').trim();
        const tenNv = String(nv.ten_nv || '').trim();

        if (!maNv) continue;

        const opt = document.createElement('option');
        opt.value = maNv;
        opt.textContent = tenNv ? `${maNv} - ${tenNv}` : maNv;
        select.appendChild(opt);
      }
    } catch (err) {
      console.error('Không tải được nhân viên:', err);
      select.innerHTML = '<option value="">Không tải được nhân viên</option>';
    }
  }

  function applyFilter() {
    const maNv = document.getElementById('filterNhanVien').value;
    const thuongHieu = document.getElementById('filterThuongHieu').value;

    console.log('ma_nv:', maNv);
    console.log('thuong_hieu:', thuongHieu);

    // Sau này nếu có dữ liệu thật trong bảng thì lọc ở đây.
  }

  document.getElementById('filterNhanVien').addEventListener('change', applyFilter);
  document.getElementById('filterThuongHieu').addEventListener('change', applyFilter);

  loadNhanVien();
</script>

</body>
</html>

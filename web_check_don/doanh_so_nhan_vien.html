<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sheet hóa đơn</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .wrap { padding: 16px; }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .toolbar {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .input {
      min-width: 190px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }

    select[multiple] {
      height: 92px;
      min-width: 240px;
    }

    .sheet-box {
      width: 100%;
      overflow: auto;
      background: white;
      border: 1px solid #d1d5db;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1500px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #d1d5db;
      padding: 8px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e5e7eb;
      font-weight: 700;
      text-align: center;
    }

    td { background: #fff; }

    tr.hidden { display: none; }

    td[contenteditable="true"]:focus {
      outline: 2px solid #2563eb;
      background: #eff6ff;
    }

    .num { text-align: right; }
    .center { text-align: center; }
  </style>
</head>
<body>

<div class="wrap">
  <h2>Sheet hóa đơn</h2>

  <div class="toolbar">
    <div class="field">
      <label>Nhân viên</label>
      <select id="filterMaNv" class="input" multiple>
        <option value="">Tất cả nhân viên</option>
      </select>
    </div>

    <div class="field">
      <label>Thương hiệu</label>
      <select id="filterThuongHieu" class="input">
        <option value="">Tất cả</option>
        <option value="hang_thuong">Hàng thường</option>
        <option value="doc_quyen">Độc quyền</option>
      </select>
    </div>
  </div>

  <div class="sheet-box">
    <table id="sheetTable">
      <thead>
        <tr>
          <th>ma_hd</th>
          <th>ma_nv</th>
          <th>nv_ban</th>
          <th>ngay</th>
          <th>ma_kh</th>
          <th>ten_kh</th>
          <th>ten_hh</th>
          <th>thuong_hieu</th>
          <th>sl</th>
          <th>sl_tra</th>
          <th>sl_thuc</th>
          <th>don_gia</th>
          <th>thanh_tien</th>
          <th>ngay_thu</th>
          <th>tien_thu</th>
          <th>ghichu</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true" class="num"></td>
          <td contenteditable="true"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const COL_MA_NV = 1;
  const COL_NV_BAN = 2;
  const COL_THUONG_HIEU = 7;

  function textCell(row, index) {
    return String(row.cells[index]?.textContent || '').trim();
  }

  function getSelectedMaNv() {
    const select = document.getElementById('filterMaNv');
    return Array.from(select.selectedOptions)
      .map(opt => opt.value)
      .filter(Boolean);
  }

  function loadNhanVienFromTable() {
    const select = document.getElementById('filterMaNv');
    const rows = Array.from(document.querySelectorAll('#tbody tr'));
    const mapNv = new Map();

    for (const row of rows) {
      const maNv = textCell(row, COL_MA_NV);
      const tenNv = textCell(row, COL_NV_BAN);

      if (!maNv) continue;
      if (!mapNv.has(maNv)) {
        mapNv.set(maNv, tenNv);
      }
    }

    select.innerHTML = '<option value="">Tất cả nhân viên</option>';

    for (const [maNv, tenNv] of mapNv.entries()) {
      const opt = document.createElement('option');
      opt.value = maNv;
      opt.textContent = tenNv ? `${maNv} - ${tenNv}` : maNv;
      select.appendChild(opt);
    }
  }

  function applyFilter() {
    const selectedMaNv = getSelectedMaNv();
    const thuongHieuFilter = document.getElementById('filterThuongHieu').value;
    const rows = Array.from(document.querySelectorAll('#tbody tr'));

    for (const row of rows) {
      const maNv = textCell(row, COL_MA_NV);
      const thuongHieu = textCell(row, COL_THUONG_HIEU).toUpperCase();

      const matchNv =
        selectedMaNv.length === 0 ||
        selectedMaNv.includes(maNv);

      const coDQ = thuongHieu.includes('DQ');

      let matchThuongHieu = true;

      if (thuongHieuFilter === 'doc_quyen') {
        matchThuongHieu = coDQ;
      }

      if (thuongHieuFilter === 'hang_thuong') {
        matchThuongHieu = !coDQ;
      }

      row.classList.toggle('hidden', !(matchNv && matchThuongHieu));
    }
  }

  document.getElementById('filterMaNv').addEventListener('change', applyFilter);
  document.getElementById('filterThuongHieu').addEventListener('change', applyFilter);

  document.getElementById('tbody').addEventListener('input', function () {
    loadNhanVienFromTable();
    applyFilter();
  });

  loadNhanVienFromTable();
</script>

</body>
</html>
